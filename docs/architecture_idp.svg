<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111a2e"/>
    </linearGradient>
    <linearGradient id="boxOrange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </linearGradient>
    <linearGradient id="boxBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="boxAI" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c2d92"/>
      <stop offset="100%" stop-color="#581c87"/>
    </linearGradient>
    <linearGradient id="boxGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
    <linearGradient id="boxPurple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#f1f5f9">Intelligent Document Processing — Architecture</text>
  <text x="600" y="64" text-anchor="middle" font-size="13" fill="#94a3b8">PDFs → Databricks AI Functions → Governed Delta Tables · entirely on-platform</text>

  <!-- Layer 1: Source documents -->
  <text x="100" y="105" font-size="11" font-weight="600" fill="#64748b" letter-spacing="1.5">SOURCE DOCUMENTS</text>
  <rect x="60" y="120" width="160" height="70" rx="10" fill="url(#boxOrange)" stroke="#fb923c" stroke-width="1"/>
  <text x="140" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Invoices</text>
  <text x="140" y="170" text-anchor="middle" font-size="11" fill="#fed7aa">PDF</text>
  
  <rect x="240" y="120" width="160" height="70" rx="10" fill="url(#boxOrange)" stroke="#fb923c" stroke-width="1"/>
  <text x="320" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Purchase Orders</text>
  <text x="320" y="170" text-anchor="middle" font-size="11" fill="#fed7aa">PDF</text>

  <rect x="420" y="120" width="160" height="70" rx="10" fill="url(#boxOrange)" stroke="#fb923c" stroke-width="1"/>
  <text x="500" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Receipts</text>
  <text x="500" y="170" text-anchor="middle" font-size="11" fill="#fed7aa">PDF</text>

  <!-- Arrow merge into Volume -->
  <line x1="140" y1="190" x2="300" y2="240" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="320" y1="190" x2="320" y2="240" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="190" x2="340" y2="240" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- UC Volume -->
  <rect x="220" y="245" width="200" height="70" rx="10" fill="url(#boxBlue)" stroke="#60a5fa" stroke-width="1"/>
  <text x="320" y="273" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Unity Catalog Volume</text>
  <text x="320" y="295" text-anchor="middle" font-size="11" fill="#bfdbfe">Raw PDF storage · governed</text>

  <!-- Arrow to ai_parse -->
  <line x1="320" y1="315" x2="320" y2="350" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ai_parse_document -->
  <rect x="220" y="355" width="200" height="70" rx="10" fill="url(#boxAI)" stroke="#c084fc" stroke-width="1"/>
  <text x="320" y="380" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">ai_parse_document()</text>
  <text x="320" y="400" text-anchor="middle" font-size="11" fill="#e9d5ff">PDF → text + layout</text>
  <text x="320" y="416" text-anchor="middle" font-size="11" fill="#e9d5ff">structured output</text>

  <!-- Arrow to ai_classify -->
  <line x1="320" y1="425" x2="320" y2="460" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ai_classify -->
  <rect x="220" y="465" width="200" height="70" rx="10" fill="url(#boxAI)" stroke="#c084fc" stroke-width="1"/>
  <text x="320" y="490" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">ai_classify()</text>
  <text x="320" y="510" text-anchor="middle" font-size="11" fill="#e9d5ff">{ invoice | PO | receipt }</text>
  <text x="320" y="526" text-anchor="middle" font-size="11" fill="#e9d5ff">routes to correct schema</text>

  <!-- Three branches to ai_extract -->
  <line x1="320" y1="535" x2="160" y2="585" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="320" y1="535" x2="320" y2="585" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="320" y1="535" x2="480" y2="585" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Three ai_extract boxes -->
  <rect x="60" y="590" width="200" height="55" rx="10" fill="url(#boxAI)" stroke="#c084fc" stroke-width="1"/>
  <text x="160" y="612" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">ai_extract()</text>
  <text x="160" y="630" text-anchor="middle" font-size="11" fill="#e9d5ff">invoice schema</text>

  <rect x="220" y="590" width="200" height="55" rx="10" fill="url(#boxAI)" stroke="#c084fc" stroke-width="1"/>
  <text x="320" y="612" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">ai_extract()</text>
  <text x="320" y="630" text-anchor="middle" font-size="11" fill="#e9d5ff">PO schema</text>

  <rect x="380" y="590" width="200" height="55" rx="10" fill="url(#boxAI)" stroke="#c084fc" stroke-width="1"/>
  <text x="480" y="612" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">ai_extract()</text>
  <text x="480" y="630" text-anchor="middle" font-size="11" fill="#e9d5ff">receipt schema</text>

  <!-- Arrows to Delta tables -->
  <line x1="160" y1="645" x2="780" y2="270" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow)"/>
  <line x1="320" y1="645" x2="780" y2="380" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow)"/>
  <line x1="480" y1="645" x2="780" y2="490" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow)"/>

  <!-- Delta tables column -->
  <text x="800" y="105" font-size="11" font-weight="600" fill="#64748b" letter-spacing="1.5">GOVERNED DELTA TABLES</text>

  <rect x="780" y="240" width="220" height="60" rx="10" fill="url(#boxGreen)" stroke="#4ade80" stroke-width="1"/>
  <text x="890" y="265" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">invoices</text>
  <text x="890" y="285" text-anchor="middle" font-size="11" fill="#bbf7d0">vendor · invoice_no · total · lines</text>

  <rect x="780" y="350" width="220" height="60" rx="10" fill="url(#boxGreen)" stroke="#4ade80" stroke-width="1"/>
  <text x="890" y="375" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">purchase_orders</text>
  <text x="890" y="395" text-anchor="middle" font-size="11" fill="#bbf7d0">po_no · vendor · expected_date</text>

  <rect x="780" y="460" width="220" height="60" rx="10" fill="url(#boxGreen)" stroke="#4ade80" stroke-width="1"/>
  <text x="890" y="485" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">receipts</text>
  <text x="890" y="505" text-anchor="middle" font-size="11" fill="#bbf7d0">merchant · date · total · tax · tip</text>

  <!-- Consumption layer -->
  <text x="1060" y="105" font-size="11" font-weight="600" fill="#64748b" letter-spacing="1.5">CONSUME</text>

  <rect x="1020" y="240" width="160" height="60" rx="10" fill="url(#boxPurple)" stroke="#a78bfa" stroke-width="1"/>
  <text x="1100" y="265" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Dashboards</text>
  <text x="1100" y="285" text-anchor="middle" font-size="11" fill="#ddd6fe">Spend · vendor mix</text>

  <rect x="1020" y="350" width="160" height="60" rx="10" fill="url(#boxPurple)" stroke="#a78bfa" stroke-width="1"/>
  <text x="1100" y="375" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Genie Space</text>
  <text x="1100" y="395" text-anchor="middle" font-size="11" fill="#ddd6fe">NL queries</text>

  <rect x="1020" y="460" width="160" height="60" rx="10" fill="url(#boxPurple)" stroke="#a78bfa" stroke-width="1"/>
  <text x="1100" y="485" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Downstream ML</text>
  <text x="1100" y="505" text-anchor="middle" font-size="11" fill="#ddd6fe">Anomaly · matching</text>

  <!-- Arrows from tables to consume -->
  <line x1="1000" y1="270" x2="1016" y2="270" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1000" y1="380" x2="1016" y2="380" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1000" y1="490" x2="1016" y2="490" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Governance band -->
  <rect x="60" y="660" width="1120" height="48" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="80" y="682" font-size="12" font-weight="700" fill="#cbd5e1" letter-spacing="1">UNITY CATALOG · documents and extracted data never leave the governed environment</text>
  <text x="80" y="700" font-size="11" fill="#94a3b8">Volume + tables under one catalog · access control · lineage · audit · PII tagging-ready</text>
</svg>
